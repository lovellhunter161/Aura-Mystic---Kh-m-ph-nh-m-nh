<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Mystic - Khám Phá Định Mệnh</title>
    <script>
      // Prevent some libraries from trying to polyfill Node.js globals in the browser
      if (typeof window !== 'undefined') {
        window.global = window;
        if (!window.process) {
          window.process = { env: {} };
        }
        
        // Some libraries try to polyfill fetch by assigning to window.fetch.
        // In some environments, window.fetch is a getter-only property, causing a TypeError.
        // We explicitly define it as a writable property to allow these libraries to proceed
        // without crashing, while preserving the original fetch functionality.
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // If we can't redefine it, we just ignore and hope for the best
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
